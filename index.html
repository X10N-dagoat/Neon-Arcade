<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arcade | Unblocked Games</title>
    <!-- Tailwind CSS CDN for no-build styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0502;
            color: white;
        }

        .neon-glow-orange {
            box-shadow: 0 0 20px rgba(255, 78, 0, 0.3);
        }

        .neon-text-orange {
            color: #ff4e00;
            text-shadow: 0 0 10px rgba(255, 78, 0, 0.5);
        }

        .neon-border-orange:hover {
            border-color: rgba(255, 78, 0, 0.5);
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0502;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        .game-card:hover {
            transform: translateY(-8px);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="selection:bg-[#ff4e00] selection:text-white">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#ff4e00]/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#00ffcc]/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen flex flex-col">
        <!-- Home View -->
        <div id="home-view">
            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-gradient-to-br from-[#ff4e00] to-[#ff8c00] rounded-2xl neon-glow-orange">
                        <i class="fas fa-gamepad text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold tracking-tighter bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                            NEON ARCADE
                        </h1>
                        <p class="text-white/40 text-sm font-medium tracking-widest uppercase">Unblocked & Unfiltered</p>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <!-- Search -->
                    <div class="relative group">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-[#ff4e00] transition-colors"></i>
                        <input
                            type="text"
                            id="search-input"
                            placeholder="Search games..."
                            class="w-full sm:w-64 pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#ff4e00]/50 focus:ring-1 focus:ring-[#ff4e00]/50 transition-all placeholder:text-white/20"
                        >
                    </div>

                    <!-- Category Filter -->
                    <div class="relative group">
                        <i class="fas fa-filter absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-[#00ffcc] transition-colors"></i>
                        <select
                            id="category-filter"
                            class="w-full sm:w-48 pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#00ffcc]/50 focus:ring-1 focus:ring-[#00ffcc]/50 transition-all appearance-none cursor-pointer"
                        >
                            <option value="All" class="bg-[#1a1a1a]">All Categories</option>
                        </select>
                    </div>
                </div>
            </header>

            <!-- Games Grid -->
            <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Games will be injected here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
                <div class="p-6 bg-white/5 rounded-full mb-4">
                    <i class="fas fa-search text-4xl text-white/20"></i>
                </div>
                <h3 class="text-2xl font-bold text-white/60">No games found</h3>
                <p class="text-white/30">Try adjusting your search or category filter</p>
            </div>
        </div>

        <!-- Game View -->
        <div id="game-view" class="hidden flex-col flex-1 h-full">
            <div class="flex items-center justify-between mb-6">
                <button
                    id="back-button"
                    class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl transition-all group"
                >
                    <i class="fas fa-chevron-left group-hover:-translate-x-1 transition-transform"></i>
                    <span class="font-medium">Back to Arcade</span>
                </button>

                <div class="flex items-center gap-4">
                    <div class="hidden sm:block text-right">
                        <h2 id="current-game-title" class="text-xl font-bold">Game Title</h2>
                        <p id="current-game-category" class="text-white/40 text-xs uppercase tracking-widest">Category</p>
                    </div>
                    <div class="flex gap-2">
                        <a
                            id="external-link"
                            href="#"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="p-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg transition-all"
                            title="Open in new tab"
                        >
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                        <button
                            id="close-game"
                            class="p-2 bg-[#ff4e00]/10 hover:bg-[#ff4e00]/20 border border-[#ff4e00]/20 rounded-lg text-[#ff4e00] transition-all"
                        >
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full max-w-4xl mx-auto aspect-[4/3] bg-black rounded-3xl overflow-hidden border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative group">
                <iframe
                    id="game-frame"
                    src=""
                    class="w-full h-full border-none"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                ></iframe>
                
                <div class="absolute bottom-6 right-6 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button 
                        id="fullscreen-btn"
                        class="p-3 bg-black/60 backdrop-blur-md border border-white/10 rounded-2xl hover:bg-[#ff4e00] transition-all"
                    >
                        <i class="fas fa-expand text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer id="main-footer" class="relative z-10 border-t border-white/5 mt-auto py-12">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <i class="fas fa-gamepad text-[#ff4e00]"></i>
                    <span class="font-bold tracking-tighter">NEON ARCADE</span>
                </div>
                <p class="text-white/20 text-sm">
                    Built for speed. Optimized for fun. Unblocked for everyone.
                </p>
            </div>
        </footer>
    </div>

    <script src="./src/script.js"></script>
</body>
</html>
